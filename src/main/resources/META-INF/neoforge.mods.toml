authors="${mod_authors}"
description='''
A boss mod adding the Withered Blood One (枯血者) - a hanging vampire boss with two combat phases.

Phase 1: Hangs from chains ~7 blocks high, uses scream and curse attacks.
Phase 2: Drops to ground, crawls rapidly, pounces 3-5 times, then jumps back for a scream.

Features GeckoLib-animated custom entity with full combat AI.
'''

